
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pintura | Batalla de Talentos 2026</title>

    <link rel="stylesheet" href="../css/categorias.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div id="navbar"></div>

    <header class="hero">

        <div class="contenido">

            <img src="../img/SENA.png" class="logo" alt="SENA">

            <h1>PINTURA</h1>

            <p>Creatividad, color y expresión artística</p>

        </div>

    </header>

    <section class="ganadores">

        <h2> Top 3</h2>

        <div class="container">

            <div class="row justify-content-center align-items-end g-4">

                <div class="col-lg-3">
                    <div class="puesto segundo">
                        <img src="../img/pintura-3.png" alt="">
                        <h3>🥈 Segundo Lugar</h3>
                        <p>Jhosep Zapata</p>
                    </div>
                </div>

                <div class="col-lg-3">
                    <div class="puesto primero">
                        <img src="../img/pintura-4.png" alt="">
                        <h3>🏆 Primer Lugar</h3>
                        <p>Wendy</p>
                    </div>
                </div>

                <div class="col-lg-3">
                    <div class="puesto tercero">
                        <img src="../img//pintura-2.png" alt="">
                        <h3>🥉 Tercer Lugar</h3>
                        <p>Sebastian Herrera</p>
                    </div>
                </div>

            </div>

        </div>

    </section>

    <section class="participantes">

        <h2>Participantes</h2>

        <div class="container">

            <div class="row g-4">

                <div class="col-lg-4 col-md-6">
                    <div class="participante">
                        <img src="../img/pintura-1.png" alt="">
                        <h3>Geraldine Pardo</h3>
                    </div>
                </div>

                <div class="col-lg-4 col-md-6">
                    <div class="participante">
                        <img src="../img/pintura-2.png" alt="">
                        <h3>Sebastian Herrera</h3>
                    </div>
                </div>

                <div class="col-lg-4 col-md-6">
                    <div class="participante">
                        <img src="../img/pintura-3.png" alt="">
                        <h3>Jhosep Zapata</h3>
                    </div>
                </div>

                <div class="col-lg-4 col-md-6">
                    <div class="participante">
                        <img src="../img/pintura-4.png" alt="">
                        <h3>Wendy</h3>
                    </div>
                </div>

            </div>

        </div>

    </section>
    <div id="footer"></div>
    <script>
        fetch('../includes/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            });

        fetch('../includes/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;
            });
    </script>

</body>

</html>
